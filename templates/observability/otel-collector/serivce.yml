apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.otelCollector.name }}
  labels:
    app: {{ .Values.otelCollector.name }}
spec:
  type: ClusterIP
  selector:
    app: {{ .Values.otelCollector.name }}
  ports:
  - name: otlp-grpc
    protocol: TCP
    port: {{ .Values.otelCollector.service.grpcPort }}
    targetPort: 4317

  - name: otlp-http
    protocol: TCP
    port: {{ .Values.otelCollector.service.httpPort }}
    targetPort: 4318

  - name: metrics
    protocol: TCP
    port: {{ .Values.otelCollector.service.metricsPort }}
    targetPort: 8889
