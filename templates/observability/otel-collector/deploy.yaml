apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.otelCollector.name }}
  labels:
    app: {{ .Values.otelCollector.name }}

spec:
  replicas: 1

  selector:
    matchLabels:
      app: {{ .Values.otelCollector.name }}

  template:
    metadata:
      labels:
        app: {{ .Values.otelCollector.name }}
    spec:
      containers:
        - name: otel-collector
          image: "{{ .Values.otelCollector.image.repository }}:{{ .Values.otelCollector.image.tag }}"
          imagePullPolicy: {{ .Values.otelCollector.image.pullPolicy }}

          args:
            - "--config=/conf/otel-collector-config.yaml"

          ports:
            - name: otlp-grpc
              containerPort: 4317
            - name: otlp-http
              containerPort: 4318
            - name: prom-metrics
              containerPort: 8889
            - name: health
              containerPort: 13133

          readinessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 5
            periodSeconds: 10

          volumeMounts:
            - name: config
              mountPath: /conf

      volumes:
        - name: config
          configMap:
            name: otel-collector-config
