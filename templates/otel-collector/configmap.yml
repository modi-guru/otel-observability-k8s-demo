apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.otelCollector.name }}-config
data:
  otel-collector-config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
          http:

    processors:
      batch:

    exporters:
      logging:
        loglevel: info

    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [logging]

        metrics:
          receivers: [otlp]
          processors: [batch]
          exporters: [logging]

        logs:
          receivers: [otlp]
          processors: [batch]
          exporters: [logging]
